name: Auto Tag & Release

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  tag-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Configure git user
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Discover packages and create tags
        id: tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          NEW_TAGS=""
          # Find all SDK projects under src and read PackageId/Version
          while IFS= read -r csproj; do
            pkg=$(sed -n 's:.*<PackageId>\(.*\)</PackageId>.*:\1:p' "$csproj" | head -n1 || true)
            ver=$(sed -n 's:.*<Version>\(.*\)</Version>.*:\1:p' "$csproj" | head -n1 || true)

            if [[ -z "$pkg" || -z "$ver" ]]; then
              continue
            fi

            tag="$pkg/v$ver"
            if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
              echo "Tag exists: $tag (skip)"
              continue
            fi

            echo "Creating tag: $tag"
            git tag -a "$tag" -m "$tag"
            git push origin "$tag"
            NEW_TAGS+="$tag\n"

            # Create a GitHub Release with autogenerated release notes
            gh release create "$tag" -t "$tag" --generate-notes || true
          done < <(git ls-files "src/**/*.csproj")

          # Expose newline-separated tag list for downstream steps if needed
          NEW_TAGS_ESCAPED=$(printf %s "$NEW_TAGS" | sed ':a;N;$!ba;s/\n/%0A/g')
          echo "created_tags=$NEW_TAGS_ESCAPED" >> "$GITHUB_OUTPUT"