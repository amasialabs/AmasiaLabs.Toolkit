name: Auto Tag & Release

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  tag-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Configure git user
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Discover packages and create tags
        id: tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          NEW_TAGS=""
          # Iterate every src/**/*.csproj and use MSBuild's -getProperty: to evaluate
          # PackageId / Version / IsPackable through the actual SDK pipeline (which
          # respects Directory.Build.props inheritance and SDK defaults). More robust
          # than sed-parsing csproj XML, and correctly skips Web SDK / test projects
          # that have IsPackable=false.
          while IFS= read -r csproj; do
            json=$(dotnet msbuild "$csproj" -getProperty:PackageId,Version,IsPackable -nologo)
            packable=$(echo "$json" | jq -r '.Properties.IsPackable')
            pkg=$(echo     "$json" | jq -r '.Properties.PackageId')
            ver=$(echo     "$json" | jq -r '.Properties.Version')

            if [[ "$packable" != "true" ]]; then
              echo "Skipping $csproj (IsPackable=$packable)"
              continue
            fi

            if [[ -z "$pkg" || "$pkg" == "null" || -z "$ver" || "$ver" == "null" ]]; then
              echo "Skipping $csproj (missing PackageId or Version)"
              continue
            fi

            tag="$pkg/v$ver"

            # Create + push the tag only if it does not already exist. With
            # `git push --follow-tags`, the annotated tag arrives on the remote
            # together with the commit, so it is already present here — skip
            # creation but still fall through to release creation below.
            if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
              echo "Tag exists: $tag (skip creation)"
            else
              echo "Creating tag: $tag"
              git tag -a "$tag" -m "$tag"
              git push origin "$tag"
              NEW_TAGS+="$tag\n"
            fi

            # Create a GitHub Release (autogenerated notes) unless one already
            # exists for this tag. Decoupled from tag creation so that tags pushed
            # via `git push --follow-tags` still get a Release generated.
            if gh release view "$tag" >/dev/null 2>&1; then
              echo "Release exists: $tag (skip)"
            else
              echo "Creating release: $tag"
              gh release create "$tag" -t "$tag" --generate-notes || true
            fi
          done < <(git ls-files "src/**/*.csproj")

          # Expose newline-separated tag list for downstream steps if needed
          NEW_TAGS_ESCAPED=$(printf %s "$NEW_TAGS" | sed ':a;N;$!ba;s/\n/%0A/g')
          echo "created_tags=$NEW_TAGS_ESCAPED" >> "$GITHUB_OUTPUT"