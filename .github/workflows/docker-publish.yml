name: Docker Publish

on:
  workflow_run:
    workflows: [ "Auto Tag & Release" ]
    types: [ completed ]

permissions:
  contents: read
  packages: write

jobs:
  discover:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.out.outputs.matrix }}
      count: ${{ steps.out.outputs.count }}
    steps:
      - name: Checkout repository at Auto Tag commit
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Build image matrix from tags
        id: out
        shell: bash
        run: |
          set -euo pipefail
          SHA="${{ github.event.workflow_run.head_sha }}"
          echo "Head SHA from Auto Tag: $SHA"
          git fetch --tags --force
          TAGS=$(git tag --points-at "$SHA" || true)
          echo "Tags on HEAD:\n$TAGS"

          MATRIX='[]'

          while IFS= read -r tag; do
            # Expect tags like '<PackageId>/vX.Y.Z'
            [[ -z "${tag:-}" ]] && continue
            [[ "$tag" != */v* ]] && continue

            pkg="${tag%%/v*}"
            ver="${tag##*/v}"
            [[ -z "$pkg" || -z "$ver" ]] && continue

            dockerfile="src/$pkg/Dockerfile"
            if [[ ! -f "$dockerfile" ]]; then
              continue
            fi

            # Derive image short name from PackageId
            name="$pkg"
            name="${name#AmasiaLabs.Toolkit.}"
            name="${name%.Host}"
            name=$(echo "$name" | tr '[:upper:]' '[:lower:]' | sed 's/\./-/g')
            repo="ghcr.io/${{ github.repository_owner }}/$name"

            major="${ver%%.*}"
            minor_part="${ver#*.}"; minor="${minor_part%%.*}"
            major_minor="$major.$minor"

            item=$(jq -nc \
              --arg dockerfile "$dockerfile" \
              --arg image_repo "$repo" \
              --arg version "$ver" \
              --arg major "$major" \
              --arg minor "$minor" \
              --arg major_minor "$major_minor" \
              '{dockerfile:$dockerfile,image_repo:$image_repo,version:$version,major:$major,minor:$minor,major_minor:$major_minor}')

            MATRIX=$(jq -c --argjson item "$item" '. + [ $item ]' <<<"$MATRIX")
          done <<< "$TAGS"

          COUNT=$(jq -r 'length' <<<"$MATRIX")
          echo "Discovered $COUNT image(s) to build."
          echo "Matrix: $MATRIX"

          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

  build-and-push:
    needs: discover
    if: ${{ needs.discover.outputs.count != '0' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.discover.outputs.matrix) }}
    steps:
      - name: Checkout repository at Auto Tag commit
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_PACKAGES_PAT }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ matrix.image_repo }}:${{ matrix.version }}
            ${{ matrix.image_repo }}:${{ matrix.major_minor }}
            ${{ matrix.image_repo }}:${{ matrix.major }}
            ${{ matrix.image_repo }}:latest
