name: Docker Publish

on:
  workflow_run:
    workflows: [ "Auto Tag & Release" ]
    types: [ completed ]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    # Run only if Auto Tag & Release succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository at Auto Tag commit
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Find Host tag on this commit
        id: discover
        run: |
          set -euo pipefail
          SHA="${{ github.event.workflow_run.head_sha }}"
          echo "Head SHA from Auto Tag: $SHA"
          git fetch --tags --force
          TAGS=$(git tag --points-at "$SHA" || true)
          echo "Tags on HEAD:\n$TAGS"

          HOST_TAG=$(echo "$TAGS" | grep -E '^AmasiaLabs\.Toolkit\.FlowflakeId\.Grpc\.Host/v[0-9]+' | head -n1 || true)
          if [[ -z "${HOST_TAG:-}" ]]; then
            echo "No Host tag found. Skipping build."
            echo "host_tag=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Host tag: $HOST_TAG"
          echo "host_tag=$HOST_TAG" >> "$GITHUB_OUTPUT"

          if [[ "$HOST_TAG" == *"/v"* ]]; then
            VERSION="${HOST_TAG##*/v}"
          else
            VERSION="${HOST_TAG#v}"
          fi

          MAJOR="${VERSION%%.*}"
          MINOR_PART="${VERSION#*.}"; MINOR="${MINOR_PART%%.*}"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "major=$MAJOR" >> "$GITHUB_OUTPUT"
          echo "minor=$MINOR" >> "$GITHUB_OUTPUT"
          echo "major_minor=$MAJOR.$MINOR" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        if: ${{ steps.discover.outputs.host_tag != '' }}
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: ${{ steps.discover.outputs.host_tag != '' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        if: ${{ steps.discover.outputs.host_tag != '' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/AmasiaLabs.Toolkit.FlowflakeId.Grpc.Host/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/flowflakeid-grpc:${{ steps.discover.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/flowflakeid-grpc:${{ steps.discover.outputs.major_minor }}
            ghcr.io/${{ github.repository_owner }}/flowflakeid-grpc:${{ steps.discover.outputs.major }}
            ghcr.io/${{ github.repository_owner }}/flowflakeid-grpc:latest
