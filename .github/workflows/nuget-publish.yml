name: Build & Publish NuGet

on:
  # Run after Auto Tag & Release completes to avoid GITHUB_TOKEN chaining limits
  workflow_run:
    workflows: ["Auto Tag & Release"]
    types: [completed]
  workflow_dispatch:

jobs:
  publish:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build all
        run: dotnet build --configuration Release --no-restore

      - name: Test all
        run: dotnet test --configuration Release --no-build

      - name: Pack all
        run: dotnet pack --configuration Release --no-build --output ./artifacts

      - name: Publish new NuGet packages to GitHub Packages (tags from Auto Tag)
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PACKAGES_PAT }}
          GH_OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail

          # Use the head SHA from Auto Tag workflow and find tags pointing at it
          SHA="${{ github.event.workflow_run.head_sha }}"
          echo "Head SHA from Auto Tag: $SHA"
          git fetch --tags --force
          TAGS=$(git tag --points-at "$SHA" || true)
          echo "Tags on HEAD:\n$TAGS"

          for pkg in ./artifacts/*.nupkg; do
            # Extract Id and Version from the nuspec inside the nupkg
            spec_id=$(unzip -p "$pkg" "*.nuspec" | sed -n 's:.*<id>\(.*\)</id>.*:\1:p' | head -n1)
            spec_version=$(unzip -p "$pkg" "*.nuspec" | sed -n 's:.*<version>\(.*\)</version>.*:\1:p' | head -n1)

            if [[ -z "${spec_id:-}" || -z "${spec_version:-}" ]]; then
              echo "Could not parse nuspec for $pkg, skipping."
              continue
            fi

            # Determine if a matching tag exists for this package/version
            MATCHED=false
            if echo "$TAGS" | grep -qx "$spec_id/v$spec_version"; then
              MATCHED=true
            elif echo "$TAGS" | grep -qx "v$spec_version"; then
              MATCHED=true
            fi

            if [[ "$MATCHED" != "true" ]]; then
              echo "No matching tag for $spec_id $spec_version, skipping."
              continue
            fi

            nameLower=$(echo "$spec_id" | tr '[:upper:]' '[:lower:]')
            version="$spec_version"
            echo "Checking $spec_id $version..."

            result=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
              "https://nuget.pkg.github.com/${GH_OWNER}/v3/registration3-gz-semver2/${nameLower}/index.json" \
              | jq -r '.items[].items[].catalogEntry.version' 2>/dev/null | grep -ix "$version" || true)

            if [[ -z "$result" ]]; then
              echo "Version $version is new, publishing $spec_id..."
              dotnet nuget push "$pkg" --api-key "$GITHUB_TOKEN" --source "https://nuget.pkg.github.com/${GH_OWNER}/index.json" --skip-duplicate
            else
              echo "Version $version already exists for $spec_id, skipping."
            fi
          done

      - name: Show published artifacts
        if: always()
        run: ls -l ./artifacts
