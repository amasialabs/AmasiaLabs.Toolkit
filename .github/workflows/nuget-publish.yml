name: Build & Publish NuGet

on:
  # Run after Auto Tag & Release completes to avoid GITHUB_TOKEN chaining limits
  workflow_run:
    workflows: ["Auto Tag & Release"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout release commit
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build all
        run: dotnet build --configuration Release --no-restore

      - name: Test all
        run: dotnet test --configuration Release --no-build

      - name: Pack all
        run: dotnet pack --configuration Release --no-build --output ./artifacts

      - name: Publish new NuGet packages to NuGet.org
        shell: bash
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
          RELEASE_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          set -euo pipefail

          if [[ -z "${NUGET_API_KEY:-}" ]]; then
            echo "NUGET_API_KEY secret is not configured."
            exit 1
          fi

          # Use the release commit and find package tags pointing at it.
          echo "Release SHA: $RELEASE_SHA"
          git fetch --tags --force
          TAGS=$(git tag --points-at "$RELEASE_SHA" || true)
          echo "Tags on release SHA:"
          echo "$TAGS"

          shopt -s nullglob
          packages=(./artifacts/*.nupkg)
          if (( ${#packages[@]} == 0 )); then
            echo "No NuGet packages found in ./artifacts."
            exit 0
          fi

          for pkg in "${packages[@]}"; do
            # Extract Id and Version from the nuspec inside the nupkg
            spec_id=$(unzip -p "$pkg" "*.nuspec" | sed -n 's:.*<id>\(.*\)</id>.*:\1:p' | head -n1)
            spec_version=$(unzip -p "$pkg" "*.nuspec" | sed -n 's:.*<version>\(.*\)</version>.*:\1:p' | head -n1)

            if [[ -z "${spec_id:-}" || -z "${spec_version:-}" ]]; then
              echo "Could not parse nuspec for $pkg, skipping."
              continue
            fi

            # Determine if a matching tag exists for this package/version
            MATCHED=false
            if echo "$TAGS" | grep -Fxq "$spec_id/v$spec_version"; then
              MATCHED=true
            elif echo "$TAGS" | grep -Fxq "v$spec_version"; then
              MATCHED=true
            fi

            if [[ "$MATCHED" != "true" ]]; then
              echo "No matching tag for $spec_id $spec_version, skipping."
              continue
            fi

            echo "Publishing $spec_id $spec_version to NuGet.org..."
            dotnet nuget push "$pkg" \
              --api-key "$NUGET_API_KEY" \
              --source "https://api.nuget.org/v3/index.json" \
              --skip-duplicate
          done

      - name: Show published artifacts
        if: always()
        run: ls -l ./artifacts
