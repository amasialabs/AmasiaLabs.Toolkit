name: Build & Publish NuGet

on:
  # Run after Auto Tag & Release completes to avoid GITHUB_TOKEN chaining limits
  workflow_run:
    workflows: ["Auto Tag & Release"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout release commit
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build all
        run: dotnet build --configuration Release --no-restore

      - name: Test all
        run: dotnet test --configuration Release --no-build

      - name: Pack all
        run: dotnet pack --configuration Release --no-build --output ./artifacts

      - name: Publish new NuGet packages to NuGet.org
        shell: bash
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
          RELEASE_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          set -euo pipefail

          if [[ -z "${NUGET_API_KEY:-}" ]]; then
            echo "NUGET_API_KEY secret is not configured."
            exit 1
          fi

          # Use the release commit and find package tags pointing at it.
          echo "Release SHA: $RELEASE_SHA"
          git fetch --tags --force
          TAGS=$(git tag --points-at "$RELEASE_SHA" || true)
          echo "Tags on release SHA:"
          echo "$TAGS"

          # Iterate packable src projects (via MSBuild evaluation, not nuspec sed) to
          # decide which artifacts to publish. This matches what auto-tag-release.yml
          # does and avoids fragile shell parsing of nuspec XML inside the nupkg.
          while IFS= read -r csproj; do
            json=$(dotnet msbuild "$csproj" -getProperty:PackageId,Version,IsPackable -nologo)
            packable=$(echo "$json" | jq -r '.Properties.IsPackable')
            pkg=$(echo     "$json" | jq -r '.Properties.PackageId')
            ver=$(echo     "$json" | jq -r '.Properties.Version')

            if [[ "$packable" != "true" ]]; then
              continue
            fi

            if [[ -z "$pkg" || "$pkg" == "null" || -z "$ver" || "$ver" == "null" ]]; then
              continue
            fi

            tag="$pkg/v$ver"
            if ! echo "$TAGS" | grep -Fxq "$tag"; then
              echo "No matching tag for $pkg $ver, skipping."
              continue
            fi

            nupkg="./artifacts/${pkg}.${ver}.nupkg"
            if [[ ! -f "$nupkg" ]]; then
              echo "Expected $nupkg not found, skipping."
              continue
            fi

            echo "Publishing $pkg $ver to NuGet.org..."
            dotnet nuget push "$nupkg" \
              --api-key "$NUGET_API_KEY" \
              --source "https://api.nuget.org/v3/index.json" \
              --skip-duplicate
          done < <(git ls-files "src/**/*.csproj")

      - name: Show published artifacts
        if: always()
        run: ls -l ./artifacts
