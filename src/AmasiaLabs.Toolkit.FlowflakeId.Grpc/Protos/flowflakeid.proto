syntax = "proto3";

option csharp_namespace = "AmasiaLabs.Toolkit.FlowflakeId.Grpc";

package flowflake;

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

service FlowflakeIds {
  // Generate new ID based on server time source and epoch
  rpc GetId (google.protobuf.Empty) returns (IdResponse);
  // Generate ID for a provided absolute timestamp
  rpc GetIdForDate (DateRequest) returns (IdResponse);
  // Returns server info required for client-side decoding and local helpers
  rpc GetServerInfo (google.protobuf.Empty) returns (ServerInfo);
}

message IdRequest {
  int64 id = 1;
}

message DateRequest {
  // Unix epoch seconds from the configured epoch in server options are not known to client.
  // So we use an absolute timestamp; server will compute relative seconds.
  google.protobuf.Timestamp timestamp = 1;
}

message IdResponse {
  int64 id = 1;
}

message ServerInfo {
  // Epoch used by server for Flowflake
  google.protobuf.Timestamp epoch = 1;
  // Whether server uses UtcNow for Generate()
  bool useUtcNow = 2;
  // Primary instance id
  int32 instanceId = 3;
  // Failover instance id (0 if not configured)
  int32 failoverInstanceId = 4;
  // Bit layout information
  uint32 timestampShift = 5; // default 31
  uint32 instanceShift = 6;  // default 22
  uint64 sequenceMask = 7;   // default (1<<22)-1
  uint64 instanceMask = 8;   // default 511
}
